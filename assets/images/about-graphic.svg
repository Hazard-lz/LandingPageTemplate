<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <defs>
    <linearGradient id="ab-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="520" height="420" rx="24" fill="rgba(17, 24, 39, 0.8)" stroke="rgba(255,255,255,0.1)" filter="url(#shadow)"/>
  
  <!-- Team & Workflow Illustration Concept -->
  <circle cx="300" cy="180" r="70" fill="url(#ab-grad)" opacity="0.2"/>
  <circle cx="300" cy="180" r="45" fill="url(#ab-grad)"/>
  <path d="M 300 150 A 15 15 0 0 1 300 180 A 15 15 0 0 1 300 150 M 270 210 Q 300 190 330 210 Z" fill="#ffffff"/>

  <!-- Connectivity lines -->
  <line x1="160" y1="330" x2="250" y2="240" stroke="#2563eb" stroke-width="3" stroke-dasharray="6,6"/>
  <line x1="440" y1="330" x2="350" y2="240" stroke="#7c3aed" stroke-width="3" stroke-dasharray="6,6"/>

  <!-- Left Feature Node -->
  <rect x="100" y="300" width="130" height="80" rx="14" fill="rgba(37, 99, 235, 0.15)" stroke="rgba(37, 99, 235, 0.4)"/>
  <circle cx="130" cy="340" r="14" fill="#2563eb"/>
  <rect x="155" y="332" width="55" height="6" rx="3" fill="#fff"/>
  <rect x="155" y="344" width="35" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>

  <!-- Right Feature Node -->
  <rect x="370" y="300" width="130" height="80" rx="14" fill="rgba(124, 58, 237, 0.15)" stroke="rgba(124, 58, 237, 0.4)"/>
  <circle cx="400" cy="340" r="14" fill="#7c3aed"/>
  <rect x="425" y="332" width="55" height="6" rx="3" fill="#fff"/>
  <rect x="425" y="344" width="35" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
</svg>
