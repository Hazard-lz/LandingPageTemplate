<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(37, 99, 235, 0.25)"/>
      <stop offset="100%" stop-color="rgba(124, 58, 237, 0.1)"/>
    </linearGradient>
    <linearGradient id="blue-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Outer Glow Blobs -->
  <circle cx="400" cy="300" r="220" fill="#2563eb" opacity="0.18" filter="url(#glow)"/>
  <circle cx="550" cy="200" r="150" fill="#7c3aed" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Main Isometric Glass Dashboard Card -->
  <rect x="120" y="100" width="560" height="380" rx="24" fill="url(#card-grad)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  
  <!-- Header Bar of Mock UI -->
  <rect x="120" y="100" width="560" height="50" rx="24" fill="rgba(15, 23, 42, 0.6)"/>
  <circle cx="150" cy="125" r="6" fill="#ef4444"/>
  <circle cx="170" cy="125" r="6" fill="#eab308"/>
  <circle cx="190" cy="125" r="6" fill="#22c55e"/>
  
  <!-- Content Wireframe Cards -->
  <rect x="150" y="180" width="300" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <path d="M 170 270 Q 230 210 290 240 T 410 200" fill="none" stroke="url(#blue-purple)" stroke-width="4" filter="url(#glow)"/>
  <circle cx="410" cy="200" r="6" fill="#60a5fa"/>

  <!-- Mini Chart Columns -->
  <rect x="470" y="180" width="180" height="140" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="495" y="240" width="20" height="60" rx="4" fill="#2563eb"/>
  <rect x="525" y="210" width="20" height="90" rx="4" fill="#7c3aed"/>
  <rect x="555" y="230" width="20" height="70" rx="4" fill="#3b82f6"/>
  <rect x="585" y="195" width="20" height="105" rx="4" fill="#a7f3d0"/>

  <!-- Lower Stats Wireframe -->
  <rect x="150" y="340" width="500" height="100" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="190" cy="390" r="22" fill="rgba(37,99,235,0.2)"/>
  <rect x="225" y="375" width="140" height="10" rx="5" fill="rgba(255,255,255,0.6)"/>
  <rect x="225" y="395" width="90" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>

  <circle cx="420" cy="390" r="22" fill="rgba(124,58,237,0.2)"/>
  <rect x="455" y="375" width="140" height="10" rx="5" fill="rgba(255,255,255,0.6)"/>
  <rect x="455" y="395" width="90" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>

  <!-- Floating Sparkles -->
  <polygon points="100,200 106,215 121,221 106,227 100,242 94,227 79,221 94,215" fill="#60a5fa" opacity="0.8"/>
  <polygon points="680,360 684,370 694,374 684,378 680,388 676,378 666,374 676,370" fill="#c084fc" opacity="0.8"/>
</svg>
